<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>熱帶氣旋資訊 | 澳門氣象中心</title>
    <link rel="icon" href="mmclogo.jpg" type="image/jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#1E88E5', secondary: '#E3F2FD' } } }
        };
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .nav-link { @apply px-3 py-2 text-gray-700 hover:text-primary transition-colors; }
            .mobile-menu { @apply absolute top-full left-0 right-0 bg-white shadow-lg py-2 z-50 border-t border-gray-200; }
            .mobile-menu-hidden { @apply hidden; }
            .model-card { @apply bg-white rounded-xl shadow-md p-4 md:p-6 mb-6; }
            .model-img { @apply w-full md:w-3/4 mx-auto h-auto rounded-lg border border-gray-200; }
            .select-container { @apply relative w-full max-w-xs mx-auto mb-3; }
            .select-box { @apply w-full py-2 px-4 bg-white rounded-lg border border-teal-200 text-center text-base text-blue-800 shadow-sm cursor-pointer flex items-center justify-center gap-2; }
            .select-dropdown { @apply absolute top-full left-0 right-0 bg-white rounded-lg shadow-md mt-1 overflow-hidden z-10 text-sm; }
            .select-option { @apply py-1.5 px-3 hover:bg-blue-50 cursor-pointer transition-colors; }
            .hidden { display: none; }
        }
        body { background-color: #E3F2FD; }
        header { position: relative; z-index: 999; }
    </style>
</head>

<body>
<header class="bg-white shadow-sm sticky top-0">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="mmclogo.jpg" class="w-8 h-8">
            <h1 class="text-xl font-bold text-primary">澳門氣象中心</h1>
        </div>
        <nav class="hidden md:flex gap-1">
            <a href="index.html" class="nav-link">首頁</a>
            <a href="tropical-cyclone.html" class="nav-link font-medium text-primary">熱帶氣旋資訊</a>
            <a href="model.html" class="nav-link">模式預報（測試版）</a>
            <a href="about.html" class="nav-link">關於我們</a>
        </nav>
        <button id="mobileMenuBtn" class="md:hidden p-3"><i class="fa fa-bars text-xl"></i></button>
        <div id="mobileMenu" class="mobile-menu mobile-menu-hidden">
            <a href="index.html" class="block px-4 py-2">首頁</a>
            <a href="tropical-cyclone.html" class="block px-4 py-2 text-primary">熱帶氣旋資訊</a>
            <a href="model.html" class="block px-4 py-2">模式預報（測試版）</a>
            <a href="about.html" class="block px-4 py-2">關於我們</a>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-6">
    <div class="text-center mb-6">
        <h2 class="text-2xl md:text-3xl font-bold text-primary">熱帶氣旋路徑與強度預報</h2>
        <p class="text-primary font-medium">最後更新：2026-04-09 14:40</p>
    </div>

    <div class="model-card">
        <div class="select-container">
            <div id="selectBox" class="select-box">
                <span id="selectText">熱帶低氣壓</span>
                <i class="fa fa-caret-down text-teal-500 text-sm"></i>
            </div>
            <!--<div id="selectDropdown" class="select-dropdown hidden">
                <div class="select-option" data-type="A">熱帶低氣壓</div>
                <div class="select-option" data-type="B">熱帶氣旋 B</div>
            </div>-->
        </div>

        <div class="text-center mb-6">
            <p>位於關島以東海域的熱帶低氣壓，將會在未來數日橫過關島附近海域，後期路徑存在較大變數。</p>
        </div>

        <h3 class="text-lg font-bold text-primary text-center mb-2">路徑預報圖</h3>
        <img id="trackImg" src="TC-Track/TC-Track-A.png" class="model-img" alt="路徑預報圖">
        <!--<img id="trackImg" src="TC-Track/No-TC.png" class="model-img" alt="路徑預報">-->

        <h3 class="text-lg font-bold text-primary text-center mt-5 mb-2">預報資訊表</h3>
        <img id="intensityImg" src="TC-Track/TC-Intensity-A.png" class="model-img" alt="預報資訊表">
    </div>
</main>

<footer class="bg-white py-6 mt-8 text-center text-gray-500 text-sm">
    ©2026 澳門氣象中心<br>資料僅供參考，請以官方發布為準
</footer>

<script>
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('mobile-menu-hidden');
    });

    const selectBox = document.getElementById('selectBox');
    const selectDropdown = document.getElementById('selectDropdown');
    const selectText = document.getElementById('selectText');
    const trackImg = document.getElementById('trackImg');
    const intensityImg = document.getElementById('intensityImg');
    const options = document.querySelectorAll('.select-option');

    selectBox.addEventListener('click', () => {
        selectDropdown.classList.toggle('hidden');
    });

    options.forEach(opt => {
        opt.addEventListener('click', () => {
            const t = opt.dataset.type;
            selectText.textContent = `熱帶氣旋 ${t}`;
            selectDropdown.classList.add('hidden');
            
            trackImg.src = `TC-Track/TC-Track-${t}.png`;
            intensityImg.src = `TC-Track/TC-Intensity-${t}.png`;
            trackImg.alt = `熱帶氣旋 ${t} 路徑`;
            intensityImg.alt = `熱帶氣旋 ${t} 強度`;
        });
    });

    document.addEventListener('click', (e) => {
        if (!selectBox.contains(e.target)) selectDropdown.classList.add('hidden');
    });
</script>
</body>
</html>
